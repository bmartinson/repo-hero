<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Git/SCM branching logo for Repo Hero dashboard -->
  <!-- Main branch (vertical line) -->
  <line x1="20" y1="10" x2="20" y2="54" stroke="#00ddcc" stroke-width="3" stroke-linecap="round"/>
  <!-- Feature branch curve -->
  <path d="M20 22 C20 22, 28 22, 36 16" stroke="#00aaff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Merge branch curve -->
  <path d="M36 16 C44 10, 44 28, 44 28" stroke="#00aaff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Second branch curve -->
  <path d="M20 38 C20 38, 30 38, 38 44" stroke="#cc66ff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Merge back curve -->
  <path d="M44 28 C44 34, 28 40, 20 46" stroke="#00aaff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Commit nodes - main branch -->
  <circle cx="20" cy="10" r="4.5" fill="#0a0a0a" stroke="#00ddcc" stroke-width="2.5"/>
  <circle cx="20" cy="22" r="4.5" fill="#0a0a0a" stroke="#00ddcc" stroke-width="2.5"/>
  <circle cx="20" cy="38" r="4.5" fill="#0a0a0a" stroke="#00ddcc" stroke-width="2.5"/>
  <circle cx="20" cy="46" r="4.5" fill="#0a0a0a" stroke="#00ddcc" stroke-width="2.5"/>
  <circle cx="20" cy="54" r="4.5" fill="#0a0a0a" stroke="#00ddcc" stroke-width="2.5"/>
  <!-- Commit nodes - feature branch -->
  <circle cx="36" cy="16" r="4.5" fill="#0a0a0a" stroke="#00aaff" stroke-width="2.5"/>
  <circle cx="44" cy="28" r="4.5" fill="#0a0a0a" stroke="#00aaff" stroke-width="2.5"/>
  <!-- Commit node - second branch -->
  <circle cx="38" cy="44" r="4.5" fill="#0a0a0a" stroke="#cc66ff" stroke-width="2.5"/>
</svg>
